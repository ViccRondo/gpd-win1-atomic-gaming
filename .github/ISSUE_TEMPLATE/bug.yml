name: Hardware bug
description: Report a reproducible GPD Win 1 hardware or gaming-session issue
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach credentials, cookies, SSH keys, game files, or Proton prefixes.
  - type: input
    id: version
    attributes:
      label: Image or project version
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Boot
        - Display or rotation
        - Controller or keyboard
        - Audio or volume
        - Gamescope or Decky
        - Suspend or resume
        - Game compatibility
        - Update or rollback
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
