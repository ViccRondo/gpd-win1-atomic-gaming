name: Validate source

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: decky/win1-performance/package-lock.json

      - name: Validate system files
        run: bash scripts/validate.sh

      - name: Rebuild Decky plugin
        working-directory: decky/win1-performance
        run: |
          npm ci --no-audit
          npm run build

      - name: Verify committed plugin bundle
        run: git diff --exit-code -- decky/win1-performance/dist/index.js
